name: Deploy to Tigris

on:
  push:
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate production config
        env:
          ALLOWLIST: ${{ secrets.ALLOWLIST || '["*"]' }}
        run: |
          cat > public/config.js << EOF
          window.__CONSOLE_CONFIG__ = {
            environment: "production",
            stellarNetwork: "${{ secrets.STELLAR_NETWORK }}",
            rpcUrl: "${{ secrets.RPC_URL }}",
            horizonUrl: "${{ secrets.HORIZON_URL }}",
            friendbotUrl: "${{ secrets.FRIENDBOT_URL }}",
            platformUrl: "${{ secrets.PLATFORM_URL }}",
            posthogKey: "${{ secrets.POSTHOG_PROJECT_TOKEN }}",
            posthogHost: "https://us.i.posthog.com",
            otelEndpoint: "${{ secrets.OTEL_COLLECTOR_ENDPOINT }}",
            otelAuth: "${{ secrets.OTEL_COLLECTOR_AUTH }}",
            allowlist: $ALLOWLIST,
          };
          EOF

      - name: Build production bundle
        run: deno task build -- --production

      - name: Deploy to Tigris (testnet)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          aws s3 sync public/ s3://moonlight-council-console/ \
            --endpoint-url https://fly.storage.tigris.dev \
            --acl public-read \
            --delete \
            --no-progress

  deploy-mainnet:
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate mainnet config
        env:
          ALLOWLIST: ${{ secrets.MAINNET_ALLOWLIST || '["*"]' }}
        run: |
          cat > public/config.js << EOF
          window.__CONSOLE_CONFIG__ = {
            environment: "production",
            stellarNetwork: "testnet",
            rpcUrl: "https://soroban-testnet.stellar.org",
            horizonUrl: "https://horizon-testnet.stellar.org",
            friendbotUrl: "https://friendbot.stellar.org",
            platformUrl: "${{ secrets.MAINNET_PLATFORM_URL }}",
            posthogKey: "${{ secrets.POSTHOG_PROJECT_TOKEN }}",
            posthogHost: "https://us.i.posthog.com",
            otelEndpoint: "${{ secrets.MAINNET_OTEL_COLLECTOR_ENDPOINT }}",
            otelAuth: "${{ secrets.MAINNET_OTEL_COLLECTOR_AUTH }}",
            allowlist: $ALLOWLIST,
          };
          EOF

      - name: Build production bundle
        run: deno task build -- --production

      - name: Deploy to Tigris (mainnet)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MAINNET_TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MAINNET_TIGRIS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          aws s3 sync public/ s3://mainnet-council-console/ \
            --endpoint-url https://fly.storage.tigris.dev \
            --acl public-read \
            --delete \
            --no-progress
