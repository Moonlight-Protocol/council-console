name: Deploy to Tigris

on:
  push:
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate production config
        run: |
          cat > public/config.js << EOF
          window.__CONSOLE_CONFIG__ = {
            environment: "production",
            stellarNetwork: "testnet",
            rpcUrl: "https://soroban-testnet.stellar.org",
            horizonUrl: "https://horizon-testnet.stellar.org",
            friendbotUrl: "https://friendbot.stellar.org",
            posthogKey: "${{ secrets.POSTHOG_PROJECT_TOKEN }}",
            posthogHost: "https://us.i.posthog.com",
            otel: {
              endpoint: "${{ secrets.GRAFANA_OTLP_ENDPOINT }}",
              auth: "${{ secrets.GRAFANA_OTLP_AUTH }}"
            }
          };
          EOF

      - name: Build production bundle
        run: deno task build -- --production

      - name: Deploy to Tigris
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          aws s3 sync public/ s3://moonlight-council-console/ \
            --endpoint-url https://fly.storage.tigris.dev \
            --acl public-read \
            --delete \
            --no-progress
