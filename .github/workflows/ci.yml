name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: deno task build

  test:
    runs-on: ubuntu-latest
    services:
      stellar:
        image: stellar/quickstart:latest
        options: >-
          --health-cmd "curl -sf http://localhost:8000/soroban/rpc -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' | grep -q healthy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
        ports:
          - 8000:8000
        env:
          ENABLE_LOGS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Wait for Stellar network
        run: |
          echo "Waiting for Friendbot..."
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:8000/friendbot?addr=GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF" > /dev/null 2>&1; then
              echo "Friendbot ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "Friendbot not ready after 60 attempts"; exit 1; fi
            sleep 5
          done

      - name: Build contracts
        run: |
          cd $HOME
          git clone https://github.com/Moonlight-Protocol/soroban-core.git
          cd soroban-core
          stellar contract build --manifest-path contracts/channel-auth/Cargo.toml
          stellar contract build --manifest-path contracts/privacy-channel/Cargo.toml

      - name: Run tests
        env:
          STELLAR_RPC_URL: http://localhost:8000/soroban/rpc
          FRIENDBOT_URL: http://localhost:8000/friendbot
          SOROBAN_CORE_PATH: ${{ github.workspace }}/../soroban-core
        run: |
          export SOROBAN_CORE_PATH="$HOME/soroban-core"
          deno task test
